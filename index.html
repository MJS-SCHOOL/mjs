<!DOCTYPE html>
<html lang="so">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MJS Dashboard V3</title>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      color:#fff;
    }

    /* TOP BAR */
    .top-bar{
      background:rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      padding:12px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      font-size:14px;
    }

    .top-bar i{
      margin-right:6px;
    }

    /* HEADER */
    .dashboard-header{
      text-align:center;
      padding:30px 20px;
    }

    .logo-img{
      width:100px;
      height:100px;
      border-radius:50%;
      animation:floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-10px);}
    }

    .logo-text{
      margin-top:10px;
      font-size:22px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .year-text{
      font-size:14px;
      opacity:0.8;
    }

    /* GRID */
    .dashboard-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:25px;
      padding:30px;
      width:100%;
      max-width:1200px;
      margin:auto;
    }

    /* CARD */
    .box{
      background:rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border-radius:18px;
      padding:25px;
      text-align:center;
      text-decoration:none;
      color:#fff;
      transition:0.4s ease;
      position:relative;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.15);
    }

    .box::before{
      content:"";
      position:absolute;
      width:150%;
      height:150%;
      background:linear-gradient(45deg,transparent,rgba(255,255,255,0.2),transparent);
      top:-100%;
      left:-100%;
      transform:rotate(25deg);
      transition:0.6s;
    }

    .box:hover::before{
      top:100%;
      left:100%;
    }

    .box:hover{
      transform:translateY(-8px) scale(1.03);
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    .box-icon{
      font-size:45px;
      margin-bottom:15px;
      color:#00eaff;
    }

    .box h3{
      font-size:20px;
      margin-bottom:8px;
    }

    .box p{
      font-size:14px;
      opacity:0.8;
    }

    /* FOOTER */
    footer{
      text-align:center;
      padding:15px;
      margin-top:auto;
      background:rgba(0,0,0,0.3);
      backdrop-filter:blur(10px);
      font-size:14px;
    }

    /* MOBILE */
    @media(max-width:600px){
      .logo-text{font-size:18px;}
      .box h3{font-size:18px;}
      .box-icon{font-size:38px;}
    }

  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div><i class="fas fa-school"></i> Mao'alim Jama School</div>
    <div><i class="fas fa-map-marker-alt"></i> Mug - Som X/W - HL</div>
  </div>

  <!-- HEADER -->
  <header class="dashboard-header">
    <img src="https://res.cloudinary.com/dsnlshm9k/image/upload/v1734294137/LOGO_LAST_SAX_2024-2025_rkln16.png" class="logo-img">
    <div class="logo-text">IMTIXAANKA DANBE</div>
    <div class="year-text">2025 - 2026</div>
  </header>

  <!-- DASHBOARD CARDS -->
  <div class="dashboard-grid">

      <h3>SUBAX</h3>

    </a>

    <a href="https://mjs.rf.gd/WW/login.php" class="box">

  <!-- FOOTER -->
